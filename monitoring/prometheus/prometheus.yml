global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "fastapi-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: "fastapi-observability"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]