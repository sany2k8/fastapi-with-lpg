server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Discover containers via the Docker API (docker.sock) and stream their
  # logs the same way. No filesystem access to /var/lib/docker is needed.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # Use the container name as the "container" label ("/fastapi-app" -> "fastapi-app")
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"

      # Expose which compose project the container belongs to
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: "compose_project"

    pipeline_stages:
      # App logs are JSON — parse fields so they become queryable
      - json:
          expressions:
            level: level
            request_id: request_id
            path: path
            status_code: status_code
      - labels:
          level:
          status_code: